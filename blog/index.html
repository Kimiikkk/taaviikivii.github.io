</head>

<body>


<header class="site-header">
    <div class="logo">K</div>
</header>

<button id="theme-toggle">☀️</button>

<div class="container">

    <a href="../index.html" class="back">
        ← back home
    </a>

    <h1>Blog</h1>

    <p class="subtitle">
        Thoughts on backend development, operating systems,
        programming and projects I'm building.
    </p>

    <a href="os-login-system.html" class="post">

        <div class="date">
            June 2026
        </div>

        <div class="title">
            Building a Bootloader Login System from Scratch
        </div>

    </a>

</div>

<script>

    const toggleBtn = document.getElementById("theme-toggle");

    if (localStorage.getItem("theme") === "dark") {

        document.body.classList.add("dark");

        toggleBtn.innerHTML = "🌙";

    }

    toggleBtn.addEventListener("click", () => {

        document.body.classList.toggle("dark");

        const darkMode =
            document.body.classList.contains("dark");

        localStorage.setItem(
            "theme",
            darkMode ? "dark" : "light"
        );

        toggleBtn.innerHTML =
            darkMode ? "🌙" : "☀️";

    });

</script>

</body>

</html>
